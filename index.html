<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morning Brew</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent:        #FFFFFF;
      --accent-glow:   rgba(255, 255, 255, 0.08);
      --accent-border: rgba(255, 255, 255, 0.22);
      --purple:        #B07FE0;
      --purple-glow:   rgba(176, 127, 224, 0.12);
      --purple-border: rgba(176, 127, 224, 0.30);
      --surface:       rgba(12, 6, 22, 0.82);
      --surface-solid: #0C0616;
      --card-hover:    rgba(255, 255, 255, 0.05);
      --border:        rgba(255, 255, 255, 0.09);
      --text:          #F2F2F2;
      --muted:         #888888;
      --muted-light:   #555555;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background-color: #130920;
      background-image: url('image.jpeg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      z-index: 50;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .logo-img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 0 10px rgba(200, 100, 255, 0.5));
    }

    .logo-fallback {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--accent-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      color: var(--accent);
      flex-shrink: 0;
    }

    .header-titles h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .header-titles .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #next-refresh {
      font-size: 11px;
      color: var(--muted-light);
    }

    #last-updated {
      font-size: 11px;
      color: var(--muted);
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--accent-border);
      color: var(--accent);
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
      transition: background 0.15s, border-color 0.15s;
    }
    .refresh-btn:hover { background: var(--accent-glow); border-color: rgba(255,255,255,0.4); }
    .refresh-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .refresh-btn svg { transition: transform 0.15s; }
    .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MAIN GRID ───────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
      background: rgba(10, 4, 18, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .panel:last-child { border-right: none; }

    /* ── PANEL HEADER ────────────────────────────── */
    .panel-header {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 12px;
      flex-shrink: 0;
    }

    .panel-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title-row h2 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .article-count {
      font-size: 11px;
      color: var(--muted-light);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── TOPIC FILTER TAGS ───────────────────────── */
    .topic-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 9px;
    }

    .topic-tag {
      font-size: 10px;
      font-weight: 600;
      color: var(--purple);
      background: var(--purple-glow);
      border: 1px solid var(--purple-border);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.2px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .topic-tag:hover:not(.active) {
      background: rgba(176, 127, 224, 0.25);
      border-color: rgba(176, 127, 224, 0.55);
    }

    .topic-tag.active {
      background: var(--purple);
      color: #0C0616;
      border-color: var(--purple);
      font-weight: 700;
    }

    /* left panel accent bar */
    #napster-panel .panel-header { border-left: 3px solid rgba(255,255,255,0.5); }
    #ai-panel .panel-header      { border-left: 3px solid var(--purple); }

    /* ── ARTICLES SCROLL ─────────────────────────── */
    .articles-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px 16px;
    }

    .articles-scroll::-webkit-scrollbar { width: 3px; }
    .articles-scroll::-webkit-scrollbar-track { background: transparent; }
    .articles-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* ── ARTICLE CARD ────────────────────────────── */
    .article-card {
      padding: 14px 12px;
      border-radius: 7px;
      transition: background 0.12s;
    }
    .article-card:hover { background: var(--card-hover); }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }

    /* Napster panel — white accents */
    #napster-panel .source-dot  {
      width: 5px; height: 5px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      flex-shrink: 0;
    }
    #napster-panel .source-name {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    /* AI panel — purple accents */
    #ai-panel .source-dot  {
      width: 5px; height: 5px;
      background: var(--purple);
      border-radius: 50%;
      flex-shrink: 0;
    }
    #ai-panel .source-name {
      font-size: 10px;
      font-weight: 700;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .sep { color: var(--muted-light); font-size: 10px; }

    .article-date {
      font-size: 10px;
      color: var(--muted);
    }

    .article-title {
      font-size: 13.5px;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 5px;
    }

    .article-title a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.12s;
    }
    #napster-panel .article-title a:hover { color: #FFFFFF; text-decoration: underline; }
    #ai-panel      .article-title a:hover { color: var(--purple); }

    .article-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 2px 12px;
    }

    /* ── LOADING ─────────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 24px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    .loading-state p { font-size: 12px; color: var(--muted); }

    /* ── ERROR ───────────────────────────────────── */
    .error-state { padding: 40px 24px; text-align: center; }
    .error-state .error-icon { font-size: 28px; margin-bottom: 10px; }
    .error-state p { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .error-state .err-detail {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted-light);
      font-family: monospace;
      background: rgba(255,255,255,0.04);
      padding: 8px 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      text-align: left;
      word-break: break-all;
    }

    /* ── EMPTY ───────────────────────────────────── */
    .empty-state { padding: 60px 24px; text-align: center; }
    .empty-state p { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img
      src="napster-logo.png"
      class="logo-img"
      alt="Napster"
      onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';"
    />
    <div class="logo-fallback" id="logo-fallback" style="display:none;">N</div>
    <div class="header-titles">
      <h1>Morning Brew</h1>
      <div class="subtitle" id="last-updated">Loading news...</div>
    </div>
  </div>
  <div class="header-right">
    <span id="next-refresh"></span>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M11 6.5A4.5 4.5 0 1 1 6.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M6.5 2L9 4M6.5 2L9 0.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Refresh
    </button>
  </div>
</header>

<main>
  <!-- LEFT: Napster News -->
  <section class="panel" id="napster-panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <h2>Napster in the News</h2>
        <span class="article-count" id="napster-count">—</span>
      </div>
    </div>
    <div class="articles-scroll" id="napster-articles">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Fetching Napster news...</p>
      </div>
    </div>
  </section>

  <!-- RIGHT: AI & Tech News -->
  <section class="panel" id="ai-panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <h2>AI &amp; Technology Intelligence</h2>
        <span class="article-count" id="ai-count">—</span>
      </div>
      <div class="topic-tags" id="topic-tags">
        <!-- Built by JS -->
      </div>
    </div>
    <div class="articles-scroll" id="ai-articles">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Fetching AI &amp; tech news...</p>
      </div>
    </div>
  </section>
</main>

<script>
  // ── CONFIG ─────────────────────────────────────────────
  const API_KEY    = '8d5681dc34a2f5f27d225492d375879b';
  const GNEWS_BASE = 'https://gnews.io/api/v4/search';
  const REFRESH_MS = 12 * 60 * 60 * 1000;
  const PAGE_SIZE  = 10; // GNews free tier max per request

  // ── AI TOPIC DEFINITIONS ───────────────────────────────
  // Each topic is fetched separately (10 articles each) then combined → 25-35 unique articles
  const AI_TOPICS = [
    { label: 'All',              query: null },
    { label: 'AI Agents',        query: '"AI agent" OR "AI agents" OR "agentic AI" OR "agentic"' },
    { label: 'AI in Learning',   query: '"AI learning" OR "AI education" OR "AI tutoring"' },
    { label: 'AI in Music',      query: '"AI music" OR "AI-generated music" OR "music AI" OR "AI in music" OR "music industry AI" OR "Spotify AI" OR "streaming music AI" OR "music streaming AI"' },
    { label: 'The AI Landscape', query: '"artificial intelligence" OR "generative AI" OR "large language model" OR "foundation model"' },
  ];

  // ── PUBLICATION CREDIBILITY RANKING ───────────────────
  // Based on monthly traffic / industry authority. Higher = shown first.
  const SOURCE_RANK = {
    // Tier 1 — Major global news (100M+ monthly visits)
    'reuters':                  100,
    'associated press':          99,
    'bloomberg':                 98,
    'the new york times':        97,
    'the wall street journal':   96,
    'bbc news':                  95,
    'cnn':                       94,
    'the guardian':              93,
    'washington post':           92,
    'forbes':                    91,
    'financial times':           90,
    'the economist':             89,
    'time':                      88,
    'nbcnews':                   87,
    'abc news':                  86,
    // Tier 2 — Major tech publications (20–100M monthly visits)
    'techcrunch':                85,
    'the verge':                 84,
    'wired':                     83,
    'ars technica':              82,
    'cnet':                      81,
    'engadget':                  80,
    'mashable':                  79,
    'venturebeat':               78,
    'zdnet':                     77,
    'mit technology review':     76,
    'ieee spectrum':             75,
    'gizmodo':                   74,
    'pcmag':                     73,
    'tom\'s hardware':           72,
    // Tier 3 — Business & startup media (10–30M monthly visits)
    'business insider':          70,
    'fast company':              69,
    'inc.':                      68,
    'axios':                     67,
    'the information':           66,
    'fortune':                   65,
    'quartz':                    64,
    'protocol':                  63,
    // Tier 4 — Music & entertainment industry
    'variety':                   60,
    'billboard':                 59,
    'rolling stone':             58,
    'pitchfork':                 57,
    'the hollywood reporter':    56,
    'deadline':                  55,
    'music business worldwide':  54,
    'digital music news':        53,
    'musicweek':                 52,
    'nme':                       51,
    'consequence':               50,
    'loudwire':                  49,
    // Tier 5 — AI-specific publications
    'ai business':               48,
    'ai news':                   47,
    'the ai beat':               46,
    'import ai':                 45,
    // Tier 6 — Crypto / Web3 (relevant to Napster)
    'coindesk':                  42,
    'cointelegraph':             41,
    'decrypt':                   40,
    'the block':                 39,
  };

  function getSourceScore(name) {
    if (!name) return 20;
    return SOURCE_RANK[name.toLowerCase().trim()] ?? 30;
  }

  // ── STATE ──────────────────────────────────────────────
  const aiCache       = {}; // { topicLabel: articles[] }
  let   activeFilter  = 'All';
  let   autoRefreshTimer = null;
  let   countdownTimer   = null;
  let   nextRefreshAt    = null;

  // ── UTILITIES ──────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function timeAgo(iso) {
    if (!iso) return '';
    const secs = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (secs < 60)    return 'Just now';
    if (secs < 3600)  return `${Math.floor(secs / 60)}m ago`;
    if (secs < 86400) return `${Math.floor(secs / 3600)}h ago`;
    return `${Math.floor(secs / 86400)}d ago`;
  }

  function fmtTime(d) { return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }); }
  function fmtDate(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }

  function fmtCountdown(ms) {
    if (ms <= 0) return '';
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    return `Next refresh in ${h}h ${String(m).padStart(2, '0')}m`;
  }

  // ── FETCH ──────────────────────────────────────────────
  // Use a CORS proxy when not on localhost (e.g. GitHub Pages)
  const ON_LOCALHOST = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const CORS_PROXY   = 'https://corsproxy.io/?';

  async function fetchNews(query) {
    const params = new URLSearchParams({
      q: query, sortby: 'publishedAt', lang: 'en',
      max: String(PAGE_SIZE), token: API_KEY
    });
    const apiUrl = `${GNEWS_BASE}?${params}`;
    const url    = ON_LOCALHOST ? apiUrl : `${CORS_PROXY}${encodeURIComponent(apiUrl)}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
    if (!r.ok) {
      let msg = `HTTP ${r.status}`;
      try {
        const e = await r.json();
        msg += ': ' + (e.errors ? Object.values(e.errors).join(', ') : JSON.stringify(e));
      } catch (_) {}
      throw new Error(msg);
    }
    const d = await r.json();
    if (d.errors) throw new Error(Object.values(d.errors).join(', '));
    return d.articles || [];
  }

  // ── SORT & DEDUP ───────────────────────────────────────
  function sortByCredibility(articles) {
    return [...articles].sort((a, b) =>
      getSourceScore(b.source?.name) - getSourceScore(a.source?.name)
    );
  }

  function dedup(articles) {
    const seen = new Set();
    return articles.filter(a => {
      const key = a.url || a.title;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  // ── RENDER ─────────────────────────────────────────────
  function renderCards(articles, scrollId, countId) {
    const scroll  = document.getElementById(scrollId);
    const countEl = document.getElementById(countId);
    const valid   = articles.filter(a => a.title && a.title !== '[Removed]' && a.url);

    if (valid.length === 0) {
      scroll.innerHTML = '<div class="empty-state"><p>No articles found.</p></div>';
      countEl.textContent = '0 articles';
      return;
    }

    countEl.textContent = `${valid.length} article${valid.length !== 1 ? 's' : ''}`;
    scroll.innerHTML = valid.map((a, i) => `
      <div class="article-card">
        <div class="article-meta">
          <div class="source-dot"></div>
          <span class="source-name">${esc(a.source?.name || 'Unknown')}</span>
          <span class="sep">·</span>
          <span class="article-date">${timeAgo(a.publishedAt)}</span>
        </div>
        <div class="article-title">
          <a href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">${esc(a.title)}</a>
        </div>
        ${a.description ? `<p class="article-desc">${esc(a.description)}</p>` : ''}
      </div>
      ${i < valid.length - 1 ? '<div class="card-divider"></div>' : ''}
    `).join('');
  }

  function renderAIArticles() {
    let articles;
    if (activeFilter === 'All') {
      // Take top 7 from each topic before combining so no single category dominates
      const PER_TOPIC = 7;
      const balanced = Object.values(aiCache).flatMap(items =>
        sortByCredibility(items).slice(0, PER_TOPIC)
      );
      articles = sortByCredibility(dedup(balanced));
    } else {
      articles = sortByCredibility(aiCache[activeFilter] || []);
    }
    renderCards(articles, 'ai-articles', 'ai-count');
  }

  function showLoading(scrollId, msg) {
    document.getElementById(scrollId).innerHTML = `
      <div class="loading-state"><div class="spinner"></div><p>${esc(msg)}</p></div>`;
  }

  function showError(scrollId, countId, err) {
    document.getElementById(scrollId).innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠</div>
        <p>Could not load articles. Check your internet connection and try refreshing.</p>
        <div class="err-detail">${esc(String(err))}</div>
      </div>`;
    document.getElementById(countId).textContent = 'Error';
  }

  // ── FILTER TAGS ────────────────────────────────────────
  function buildFilterTags() {
    const container = document.getElementById('topic-tags');
    container.innerHTML = AI_TOPICS.map(t => `
      <span class="topic-tag ${t.label === 'All' ? 'active' : ''}"
            data-topic="${esc(t.label)}">${esc(t.label)}</span>
    `).join('');

    container.addEventListener('click', e => {
      const tag = e.target.closest('.topic-tag');
      if (!tag) return;
      const topic = tag.dataset.topic;
      activeFilter = topic;
      document.querySelectorAll('.topic-tag').forEach(el =>
        el.classList.toggle('active', el.dataset.topic === topic)
      );
      renderAIArticles();
      document.getElementById('ai-articles').scrollTop = 0;
    });
  }

  // ── LOAD ───────────────────────────────────────────────
  async function loadNapster() {
    showLoading('napster-articles', 'Fetching Napster news…');
    try {
      const articles = await fetchNews('Napster');
      renderCards(sortByCredibility(articles), 'napster-articles', 'napster-count');
    } catch (err) {
      showError('napster-articles', 'napster-count', err);
    }
  }

  async function loadAI() {
    showLoading('ai-articles', 'Fetching AI & tech news…');
    document.getElementById('ai-count').textContent = 'Loading…';

    // Clear old cache
    Object.keys(aiCache).forEach(k => delete aiCache[k]);

    // Fetch all topics in parallel (skip "All" — it's derived)
    const topicsToFetch = AI_TOPICS.filter(t => t.query !== null);
    const results = await Promise.allSettled(
      topicsToFetch.map(t =>
        fetchNews(t.query).then(articles => ({ label: t.label, articles }))
      )
    );

    let anySuccess = false;
    results.forEach(r => {
      if (r.status === 'fulfilled') {
        aiCache[r.value.label] = r.value.articles;
        anySuccess = true;
      }
    });

    if (!anySuccess) {
      const firstErr = results.find(r => r.status === 'rejected');
      showError('ai-articles', 'ai-count', firstErr?.reason || 'Unknown error');
      return;
    }

    renderAIArticles();
  }

  // ── REFRESH ────────────────────────────────────────────
  async function refreshAll() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.classList.add('spinning');
    document.getElementById('last-updated').textContent = 'Refreshing…';

    await Promise.all([loadNapster(), loadAI()]);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Updated ${fmtDate(now)} at ${fmtTime(now)}`;

    nextRefreshAt = Date.now() + REFRESH_MS;
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      document.getElementById('next-refresh').textContent =
        fmtCountdown(nextRefreshAt - Date.now());
    }, 60_000);
    document.getElementById('next-refresh').textContent =
      fmtCountdown(nextRefreshAt - Date.now());

    btn.disabled = false;
    btn.classList.remove('spinning');
  }

  // ── INIT ───────────────────────────────────────────────
  buildFilterTags();
  refreshAll();
  autoRefreshTimer = setInterval(refreshAll, REFRESH_MS);
</script>
</body>
</html>
